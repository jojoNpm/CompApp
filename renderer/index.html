<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>CompApp</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="./popup/popup-modern.css">


</head>


<body>


<div class="app">

<!-- ===============================
SIDEBAR
=============================== -->

<div class="sidebar">

<textarea id="product-url" placeholder="Coller l'URL du produit ici..." rows="3"></textarea>

<button id="scrape-url" class="btn scrape">Scraper</button>

<button id="show-graph-all" class="btn graph">Graphique</button>

<button id="update-selected" class="btn update">Mettre à jour</button>

<button id="delete-selected" class="btn delete">Supprimer</button>

<div class="selection">
Sélectionnés : <span id="selectionCount">0</span>
</div>

</div>


<!-- ===============================
TABLEAU PRODUITS
=============================== -->

<div class="content">

<table id="products-table">

<thead>

<tr>

<th><input type="checkbox" id="check-all"></th>

<th>Nom du produit</th>
<th>Site</th>
<th>Prix</th>
<th>% Promo</th>
<th>Poids</th>
<th>€/kg</th>
<th>Marque</th>
<th>Mis à jour</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="products-body"></tbody>

</table>

</div>

</div>


<!-- ===============================
OVERLAY POPUP GLOBAL
=============================== -->

<div id="popupOverlay" class="popup-overlay hidden">

<div id="popupContainer"></div>

</div>


<script src="utils/toast.js"></script>
<script src="./popup/popup-core.js"></script>
<script type="module" src="renderer.js"></script>

</body>

</html>
