<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>CompApp</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===============================
OVERLAY GLOBAL POUR LES POPUPS
=============================== */

.popup-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.65);
  z-index: 2000;

  display: flex;
  justify-content: center;
  align-items: center;
}

.popup-overlay.hidden {
  display: none;
}

/* ===============================
CONTENU POPUP
=============================== */

#popupContainer {

  background: #2f343a;
  padding: 25px;
  border-radius: 12px;

  width: 520px;
  max-height: 90vh;

  overflow-y: auto;

  color: white;

  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* ===============================
CHAMPS
=============================== */

.popup-field {
  margin-bottom: 15px;
}

.popup-field label {
  display: block;
  margin-bottom: 5px;
  font-size: 13px;
  opacity: 0.8;
}

.popup-field input,
.popup-field select {

  width: 100%;
  padding: 8px;

  background: #444;

  border: none;
  border-radius: 5px;

  color: white;
}

/* ===============================
BOUTONS
=============================== */

.popup-buttons {

  margin-top: 20px;

  display: flex;
  justify-content: flex-end;

  gap: 10px;
}

.popup-btn {

  padding: 8px 16px;

  border: none;
  border-radius: 6px;

  cursor: pointer;
}

.btn-save {
  background: #4CAF50;
  color: white;
}

.btn-cancel {
  background: #f44336;
  color: white;
}

</style>

</head>


<body>


<div class="app">

<!-- ===============================
SIDEBAR
=============================== -->

<div class="sidebar">

<textarea id="product-url" placeholder="Coller l'URL du produit ici..." rows="3"></textarea>

<button id="scrape-url" class="btn scrape">Scraper</button>

<button id="show-graph-all" class="btn graph">Graphique</button>

<button id="update-selected" class="btn update">Mettre à jour</button>

<button id="delete-selected" class="btn delete">Supprimer</button>

<div class="selection">
Sélectionnés : <span id="selectionCount">0</span>
</div>

</div>


<!-- ===============================
TABLEAU PRODUITS
=============================== -->

<div class="content">

<table id="products-table">

<thead>

<tr>

<th><input type="checkbox" id="check-all"></th>

<th>Nom du produit</th>
<th>Site</th>
<th>Prix</th>
<th>% Promo</th>
<th>Poids</th>
<th>€/kg</th>
<th>Marque</th>
<th>Mis à jour</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="products-body"></tbody>

</table>

</div>

</div>


<!-- ===============================
OVERLAY POPUP GLOBAL
=============================== -->

<div id="popupOverlay" class="popup-overlay hidden">

<div id="popupContainer"></div>

</div>


<script type="module" src="renderer.js"></script>

</body>

</html>
