<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CompApp</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<textarea id="product-url" placeholder="Coller l'URL du produit ici..." rows="3"></textarea>

<button id="scrape-url" class="btn scrape">Scraper</button>

<button id="show-graph-all" class="btn graph">Graphique</button>

<button id="update-selected" class="btn update">Mettre à jour</button>

<button id="delete-selected" class="btn delete">Supprimer</button>

<div class="selection">
Sélectionnés : <span id="selectionCount">0</span>
</div>

</div>


<!-- TABLEAU -->
<div class="content">

<table id="products-table">

<thead>
<tr>

<th><input type="checkbox" id="check-all"></th>

<th>Nom du produit</th>
<th>Site</th>
<th>Prix</th>
<th>% Promo</th>
<th>Poids</th>
<th>€/kg</th>
<th>Marque</th>
<th>Mis à jour</th>
<th>Actions</th>

</tr>
</thead>

<tbody id="products-body"></tbody>

</table>

</div>
</div>


<!-- POPUP PRODUIT SCRAPÉ -->
<div id="popup" class="popup hidden"></div>


<!-- POPUP EDIT PRODUIT (NOUVELLE VERSION) -->
<div id="editProductPopup" class="popup hidden">

<div id="editProductContainer"></div>

</div>


<!-- POPUP HISTORIQUE -->
<div id="historyPopup" class="popup hidden">

<div class="popupContent historyLayout">

<div class="historyTop">

<div id="historyCardContainer"></div>

<div id="historyFormContainer"></div>

</div>

<table class="historyTable">

<thead>
<tr>

<th>Date</th>
<th>Prix</th>

</tr>
</thead>

<tbody id="historyTableBody"></tbody>

</table>

</div>

</div>


<!-- POPUP GRAPHIQUE -->
<div id="chartPopup" class="popup hidden">

<div class="popupContent" style="width:800px;height:500px;">

<h2 id="chartTitle">Historique des prix</h2>

<canvas id="priceChart" width="800" height="400"></canvas>

<button id="closeChart" class="btn delete" style="margin-top:10px;">Fermer</button>

</div>

</div>


<script type="module" src="renderer.js"></script>

</body>
</html>
