<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CompApp</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Styles existants */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background-color: #f0f8ff;
      position: sticky;
      top: 0;
    }
    th:first-child {
      width: 50px;
      text-align: center;
    }
    .brand-header {
      background-color: #f0f8ff;
      font-weight: bold;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px 5px 0 0;
    }
    .canonical-header {
      background-color: #e6f2ff;
      font-weight: bold;
      font-style: italic;
      padding: 8px;
      border-bottom: 1px solid #ddd;
      border-left: 2px solid #ccc;
      border-right: 2px solid #ccc;
    }
    .brand-even {
      background-color: #f8f9fa;
    }
    .brand-odd {
      background-color: #e9ecef;
    }
    .canonical-checkbox {
      margin-right: 10px;
    }
    .brand-container {
      border: 2px solid #ccc;
      border-radius: 5px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .brand-footer {
      border-bottom: 2px solid #ccc;
      border-radius: 0 0 5px 5px;
    }

    /* La sidebar */
    #product-url {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
      min-height: 40px;
      resize: vertical;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    #delete-selected {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background-color: #ff6b6b;
      color: white;
      margin-top: 10px;
      transition: background-color 0.2s;
    }

    #delete-selected:hover {
      background-color: #ff5252;
    }

    .sidebar {
      padding: 10px;
      background-color: #f8f9fa;
      border-right: 1px solid #ddd;
      width: 250px;
      display: flex;
      flex-direction: column;
    }

    .sidebar button {
      margin-bottom: 8px;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
    }

    .sidebar button:hover {
      background-color: #45a049;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      width: 80%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .popup-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
      gap: 10px;
    }

    .popup-actions button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .popup-actions button:first-child {
      background-color: #4CAF50;
      color: white;
    }

    .popup-actions button:last-child {
      background-color: #f1f1f1;
    }
    /* Police et padding */
table {
  font-size: 12px;
  border-collapse: collapse;
}

th, td {
  padding: 4px 6px;
}

/* Blocs marques */
.brand-block {
  background-color: #f0f0f0;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

/* Ligne nom canonique */
.canonical-row {
  font-style: italic;
  font-weight: bold;
  padding-left: 10px;
  border-left: 2px solid #ccc;
  border-right: 2px solid #ccc;
  background-color: #fafafa;
}

/* Ligne produit */
.product-row {
  border-bottom: 1px solid #ddd;
}

/* Prix promo */
.price-original {
  color: red;
  text-decoration: line-through;
  font-size: 0.9em;
  margin-right: 5px;
}

.price-promo {
  color: green;
  font-weight: bold;
}

/* Lien marque */
.brand-link {
  text-decoration: underline;
  color: #1976d2;
}

/* Produit indispo */
.unavailable {
  color: red;
  font-weight: bold;
  margin-left: 5px;
}

/* Fenêtre Electron pour liens */
a {
  cursor: pointer;
}
  </style>
</head>
<body>
  <div class="container" style="display: flex; height: 100vh;">
    <div class="sidebar">
      <!-- Zone de texte agrandie pour le lien -->
      <textarea id="product-url" placeholder="Coller l'URL du produit ici..." rows="3"></textarea>

      <!-- Boutons existants -->
      <button id="scrape-url">Scraper</button>
      <button id="show-graph-all">📈</button>
      <button id="update-selected">Mettre à jour la sélection</button>

      <!-- Nouveau bouton de suppression -->
      <button id="delete-selected">🗑️ Supprimer la sélection</button>
    </div>

    <div class="main-content" style="flex: 1; overflow: auto; padding: 10px;">
      <table id="products-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="check-all"></th>
            <th>Nom du produit</th>
            <th>Site</th>
            <th>Prix</th>
            <th>% Promo</th>
            <th>Poids</th>
            <th>Prix/kg</th>
            <th>Marque</th>
            <th>Mis à jour</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="products-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Popup pour les actions -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <div class="popup-panel"></div>
      <div class="popup-actions"></div>
    </div>
  </div>

  <!-- Scripts chargés à la fin pour un chargement plus rapide -->
  <script src="renderer.js"></script>
</body>
</html>
