<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CompApp</title>
<link rel="stylesheet" href="renderer4.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

<div class="sidebar">

<button class="btn scrape">Scraper</button>
<button class="btn graph">Graphique</button>
<button class="btn update">Mettre à jour</button>
<button class="btn delete">Supprimer</button>

<div class="selection">
Sélectionnés : <span id="selectionCount">0</span>
</div>

</div>


<div class="content">

<table id="productTable">

<thead>
<tr>
<th></th>
<th>Nom produit</th>
<th>Marque</th>
<th>Site</th>
<th>Prix</th>
<th>€/kg</th>
<th>Promo</th>
<th>Poids</th>
<th>Mis à jour</th>
<th></th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>


<div id="editPopup" class="popup hidden">

<div class="popupContent">

<h2>Modifier produit</h2>

<label>Nom</label>
<input id="editName">

<label>Marque</label>
<input id="editBrand">

<label>Prix</label>
<input id="editPrice">

<label>€/kg</label>
<input id="editKg">

<label>URL</label>
<input id="editUrl">

<div class="popupButtons">
<button id="saveEdit">Sauvegarder</button>
<button id="closeEdit">Annuler</button>
</div>

</div>

</div>


<div id="chartPopup" class="popup hidden">

<div class="popupContent chartBox">

<canvas id="priceChart"></canvas>

<button id="closeChart">Fermer</button>

</div>

</div>

<script src="renderer.js"></script>

</body>
</html>
